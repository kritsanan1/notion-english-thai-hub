      <line x1="250" y1="565" x2="650" y2="565" class="arrow" />
      <text x="450" y="555" class="data-flow-text">Consent Data</text>

      <!-- Authentication Flow -->
      <line x1="250" y1="285" x2="650" y2="215" class="auth-arrow" />
