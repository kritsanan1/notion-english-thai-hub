      <line x1="650" y1="215" x2="250" y2="705" class="auth-arrow" />
      <text x="450" y="650" class="auth-flow-text">Auth State</text>

      <!-- Frontend Internal Dependencies -->
      <line x1="175" y1="170" x2="175" y2="190" class="arrow" />
      <line x1="175" y1="240" x2="175" y2="260" class="arrow" />
      <line x1="175" y1="310" x2="175" y2="330" class="arrow" />
      <line x1="250" y1="145" x2="300" y2="145" class="arrow" />
      <line x1="250" y1="215" x2="300" y2="215" class="arrow" />
      <line x1="250" y1="285" x2="300" y2="285" class="arrow" />
      <line x1="250" y1="355" x2="300" y2="355" class="arrow" />
      <line x1="250" y1="425" x2="300" y2="425" class="arrow" />
      <line x1="250" y1="495" x2="300" y2="495" class="arrow" />
      <line x1="250" y1="565" x2="300" y2="565" class="arrow" />
      <line x1="250" y1="635" x2="300" y2="635" class="arrow" />
      <line x1="250" y1="705" x2="300" y2="705" class="arrow" />

      <!-- Supabase Internal Dependencies -->
      <line x1="850" y1="145" x2="900" y2="145" class="arrow" />
      <line x1="850" y1="215" x2="900" y2="215" class="arrow" />
      <line x1="850" y1="285" x2="900" y2="285" class="arrow" />
      <line x1="850" y1="355" x2="900" y2="355" class="arrow" />
      <line x1="850" y1="425" x2="900" y2="425" class="arrow" />
      <line x1="850" y1="495" x2="900" y2="495" class="arrow" />
      <line x1="850" y1="565" x2="900" y2="565" class="arrow" />
      <line x1="850" y1="635" x2="900" y2="635" class="arrow" />
      <line x1="850" y1="705" x2="900" y2="705" class="arrow" />

      <!-- Frontend to Third-Party -->
      <line x1="175" y1="750" x2="175" y2="870" class="arrow" />
      <text x="185" y="800" class="data-flow-text">Font Loading</text>

      <line x1="400" y1="750" x2="375" y2="870" class="arrow" />
      <text x="385" y="800" class="data-flow-text">Image Assets</text>

      <line x1="400" y1="750" x2="575" y2="870" class="arrow" />
      <text x="485" y="800" class="data-flow-text">Payment Integration</text>

    </svg>