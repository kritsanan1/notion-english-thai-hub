      <rect x="500" y="870" width="150" height="50" class="third-party-rect" />
      <text x="575" y="895" class="third-party-text">Stripe (Planned)</text>

      <!-- Data Flow -->
      <line x1="250" y1="145" x2="650" y2="145" class="arrow" />
      <text x="450" y="135" class="data-flow-text">Data Fetch/Submit</text>

      <line x1="250" y1="215" x2="650" y2="215" class="arrow" />
      <text x="450" y="205" class="data-flow-text">Course Data</text>

      <line x1="250" y1="285" x2="650" y2="285" class="arrow" />
