      <rect x="300" y="190" width="200" height="50" class="node-rect" />
      <text x="400" y="215" class="node-text">CourseHighlights</text>

      <rect x="300" y="260" width="200" height="50" class="node-rect" />
      <text x="400" y="285" class="node-text">TestimonialsSection</text>

      <rect x="300" y="330" width="200" height="50" class="node-rect" />
      <text x="400" y="355" class="node-text">Footer</text>

      <rect x="300" y="400" width="200" height="50" class="node-rect" />
      <text x="400" y="425" class="node-text">CoursePreviewModal</text>

      <rect x="300" y="470" width="200" height="50" class="node-rect" />
      <text x="400" y="495" class="node-text">RegistrationModal</text>

      <rect x="300" y="540" width="200" height="50" class="node-rect" />
      <text x="400" y="565" class="node-text">PDPAConsent</text>

      <rect x="300" y="610" width="200" height="50" class="node-rect" />
