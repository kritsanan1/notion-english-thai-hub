<svg width="1200" height="1000" viewBox="0 0 1200 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
      <style>
        .node-rect { fill: #e0f2f7; stroke: #007bb5; stroke-width: 2; rx: 8; ry: 8; }
        .node-text { font-family: sans-serif; font-size: 16px; fill: #333; text-anchor: middle; dominant-baseline: central; }
        .group-rect { fill: #f0f8ff; stroke: #a7d9f2; stroke-width: 1; rx: 12; ry: 12; }
        .group-label { font-family: sans-serif; font-size: 20px; font-weight: bold; fill: #005f8c; }
        .arrow { stroke: #007bb5; stroke-width: 2; marker-end: url(#arrowhead); }
        .data-flow-text { font-family: sans-serif; font-size: 14px; fill: #007bb5; }
        .third-party-rect { fill: #fff3e0; stroke: #ff9800; stroke-width: 2; rx: 8; ry: 8; }
        .third-party-text { font-family: sans-serif; font-size: 16px; fill: #e65100; text-anchor: middle; dominant-baseline: central; }
        .auth-flow-text { font-family: sans-serif; font-size: 14px; fill: #8e24aa; }
        .auth-arrow { stroke: #8e24aa; stroke-width: 2; marker-end: url(#arrowhead-auth); }
      </style>
      <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#007bb5" />
        </marker>
        <marker id="arrowhead-auth" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#8e24aa" />
        </marker>
      </defs>

      <!-- Frontend Group -->
      <rect x="50" y="50" width="500" height="700" class="group-rect" />
      <text x="300" y="80" class="group-label">Frontend (React App)</text>

      <rect x="100" y="120" width="150" height="50" class="node-rect" />
      <text x="175" y="145" class="node-text">App.tsx</text>

      <rect x="100" y="190" width="150" height="50" class="node-rect" />
      <text x="175" y="215" class="node-text">Index Page</text>

      <rect x="100" y="260" width="150" height="50" class="node-rect" />
      <text x="175" y="285" class="node-text">Auth Page</text>

      <rect x="100" y="330" width="150" height="50" class="node-rect" />
