      <rect x="900" y="330" width="200" height="50" class="node-rect" />
      <text x="1000" y="355" class="node-text">testimonials Table</text>

      <rect x="900" y="400" width="200" height="50" class="node-rect" />
      <text x="1000" y="425" class="node-text">user_inquiries Table</text>

      <rect x="900" y="470" width="200" height="50" class="node-rect" />
      <text x="1000" y="495" class="node-text">profiles Table</text>

      <rect x="900" y="540" width="200" height="50" class="node-rect" />
      <text x="1000" y="565" class="node-text">privacy_consents Table</text>

      <rect x="900" y="610" width="200" height="50" class="node-rect" />
      <text x="1000" y="635" class="node-text">orders Table</text>

      <rect x="900" y="680" width="200" height="50" class="node-rect" />
      <text x="1000" y="705" class="node-text">feedback Table</text>

      <!-- Third-Party Integrations Group -->
      <rect x="50" y="800" width="1100" height="150" class="group-rect" />
      <text x="600" y="830" class="group-label">Third-Party Integrations</text>

      <rect x="100" y="870" width="150" height="50" class="third-party-rect" />
      <text x="175" y="895" class="third-party-text">Google Fonts</text>

      <rect x="300" y="870" width="150" height="50" class="third-party-rect" />
